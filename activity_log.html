{% extends "base.html" %}
{% block content %}
<h1>Activity Log</h1>
<div class="card"><div class="table-wrap"><table><thead><tr><th>Date</th><th>Client</th><th>Type</th><th>Title</th><th>Details</th></tr></thead><tbody>{% for l in logs %}<tr><td>{{ l.created_at }}</td><td>{{ l.client_name }}</td><td>{{ l.activity_type }}</td><td>{{ l.title }}</td><td>{{ l.details }}</td></tr>{% else %}<tr><td colspan="5">No activity yet.</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
