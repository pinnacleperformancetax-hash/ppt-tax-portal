
<style id="PPT_GREEN_HARD_OVERRIDE">
:root{
  --ppt-green:#11823b!important;
  --ppt-green-dark:#0b5f2a!important;
  --ppt-green-light:#1f6f3d!important;
  --ppt-bg:#f4f6f4!important;
}
html,body{background:#f4f6f4!important;color:#1f2937!important}
aside,.sidebar,[class*="sidebar"],nav.sidebar{
  background:linear-gradient(180deg,#11823b 0%,#0b5f2a 100%)!important;
  color:white!important;
  border-right:0!important;
}
aside *, .sidebar *, [class*="sidebar"] *{color:white!important}
aside a,.sidebar a,[class*="sidebar"] a{
  color:white!important;
  background:transparent!important;
  font-weight:900!important;
}
aside a:hover,.sidebar a:hover,[class*="sidebar"] a:hover,
aside a.active,.sidebar a.active,[class*="sidebar"] a.active{
  background:rgba(255,255,255,.18)!important;
}
button,.btn,input[type="submit"]{
  background:#11823b!important;
  color:white!important;
  border:0!important;
  border-radius:12px!important;
  font-weight:900!important;
}
button:hover,.btn:hover,input[type="submit"]:hover{
  background:#1f6f3d!important;
}
.card,.metric,.box,.panel,section{
  background:white!important;
  border-color:#d8e2dc!important;
}
.metric strong,.amount,.total{
  color:#1f6f3d!important;
}
h1,h2,h3{color:#1f2937!important}
input,select,textarea{
  border-color:#cbd5d1!important;
  background:white!important;
}
input:focus,select:focus,textarea:focus{
  outline:3px solid rgba(19,79,44,.16)!important;
  border-color:#1f6f3d!important;
}
.pill,.badge{
  background:#e7f5eb!important;
  color:#11823b!important;
}
</style>

{% extends "base.html" %}{% block content %}<h1>Payments</h1><div class="card"><form method="POST" class="grid grid-3"><select name="invoice_id">{% for i in invoices %}{% if i.status != 'Paid' %}<option value="{{ i.id }}">{{ i.invoice_number or i.id }} - {{ i.client_name }} - {{ i.amount|currency }}</option>{% endif %}{% endfor %}</select><input name="amount" placeholder="Amount"><select name="method"><option>Manual Entry</option><option>Cash</option><option>Check</option><option>Zelle</option><option>Cash App</option><option>Card Outside Portal</option></select><input name="reference" placeholder="Reference"><input name="notes" placeholder="Notes"><button>Record Payment</button></form></div><div class="card"><table><thead><tr><th>Date</th><th>Invoice</th><th>Client</th><th>Method</th><th>Amount</th></tr></thead><tbody>{% for p in payments %}<tr><td>{{ p.created_at }}</td><td>{{ p.invoice_number }}</td><td>{{ p.client_name }}</td><td>{{ p.method }}</td><td>{{ p.amount|currency }}</td></tr>{% else %}<tr><td colspan="5">No payments.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
