{% extends "base.html" %}{% block content %}<h1>My Payments</h1><div class="card"><div class="table-wrap"><table><thead><tr><th>Date</th><th>Invoice</th><th>Method</th><th>Amount</th><th>Reference</th></tr></thead><tbody>{% for p in payments %}<tr><td>{{ p.created_at }}</td><td>{{ p.invoice_number }}</td><td>{{ p.method }}</td><td>{{ p.amount|currency }}</td><td>{{ p.reference or "—" }}</td></tr>{% else %}<tr><td colspan="5">No payments.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
