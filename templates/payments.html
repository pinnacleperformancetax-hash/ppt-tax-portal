{% extends "base.html" %}

{% block content %}

<h2 style="margin-bottom:20px;">Payments</h2>

<div style="background:white; padding:20px; border-radius:8px;">

    <h3>Record Payment</h3>

    <form method="POST">

        <label>Select Invoice</label><br>
        <select name="invoice_id" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="">-- Select Invoice --</option>
            {% for invoice in invoices %}
                <option value="{{ invoice.id }}">
                    {{ invoice.id }} - ${{ invoice.amount }}
                </option>
            {% endfor %}
        </select>

        <label>Amount</label><br>
        <input type="number" step="0.01" name="amount"
               style="width:100%; padding:10px; margin-bottom:10px;">

        <label>Payment Method</label><br>
        <select name="method" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="Card">Card</option>
            <option value="Cash">Cash</option>
            <option value="Zelle">Zelle</option>
            <option value="Other">Other</option>
        </select>

        <button type="submit"
                style="background:#11823b; color:white; padding:10px 20px; border:none;">
            Record Payment
        </button>

    </form>

</div>

<hr>

<h3>Payment History</h3>
<p>No payments recorded yet.</p>

{% endblock %}
