{% extends "base.html" %}{% block content %}<h1>My Invoices</h1><div class="card"><table><thead><tr><th>Invoice</th><th>Status</th><th>Amount</th><th>Due</th><th>PDF</th></tr></thead><tbody>{% for i in invoices %}<tr><td>{{ i.invoice_number or i.id }}</td><td>{{ i.status }}</td><td>{{ i.amount|currency }}</td><td>{{ i.due_date or "—" }}</td><td><a class="btn btn-dark" href="/invoices/pdf/{{ i.id }}" target="_blank">Print</a></td></tr>{% else %}<tr><td colspan="4">No invoices.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
