{% extends "base.html" %}{% block content %}<h1>Users</h1><div class="card"><h2>Create User</h2><form method="POST"><div class="grid"><div><label>Name</label><input name="name" required></div><div><label>Email</label><input type="email" name="email" required></div><div><label>Password</label><input name="password" placeholder="Temp123!"></div><div><label>Role</label><select name="role"><option value="admin">Admin</option><option value="client">Client</option></select></div><div><label>Client</label><select name="client_id"><option value="">None</option>{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div></div><button>Create User</button></form></div><div class="card"><h2>Users</h2><table><tr><th>Name</th><th>Email</th><th>Role</th><th>Client</th></tr>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.client_name }}</td></tr>{% else %}<tr><td colspan="4">No users.</td></tr>{% endfor %}</table></div>{% endblock %}
