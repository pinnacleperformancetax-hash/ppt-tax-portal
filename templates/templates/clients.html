{% extends 'base.html' %}{% block content %}<h1>Clients</h1><p class='sub'>Client list and business records.</p><div class='card'><h2>Add Client</h2><form method='POST' class='grid grid-3'><input name='name' placeholder='Client name' required><input name='business_name' placeholder='Business'><input name='email' placeholder='Email'><input name='phone' placeholder='Phone'><input name='address' placeholder='Address'><select name='client_type'><option>Individual</option><option>Business</option></select><select name='status'><option>Active</option><option>Inactive</option></select><textarea name='notes' placeholder='Notes' style='grid-column:1/-1'></textarea><button>Add Client</button></form></div><div class='card'><h2>Clients</h2><div class='table-wrap'><table><thead><tr><th>Name</th><th>Business</th><th>Email</th><th>Phone</th><th>Status</th></tr></thead><tbody>{% for c in clients %}<tr><td>{{ c.name }}</td><td>{{ c.business_name }}</td><td>{{ c.email }}</td><td>{{ c.phone }}</td><td><span class='pill'>{{ c.status }}</span></td></tr>{% else %}<tr><td colspan='5'>No clients.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
