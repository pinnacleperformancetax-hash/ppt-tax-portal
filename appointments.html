{% extends "base.html" %}{% block content %}<h1>Appointments</h1><div class="card"><form method="POST" class="grid grid-3"><div><label>Client</label><select name="client_id">{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div><div><label>Title</label><input name="title"></div><div><label>Start</label><input name="start_at"></div><div><label>End</label><input name="end_at"></div><div><label>Location</label><input name="location"></div><div><label>Status</label><select name="status"><option>Scheduled</option><option>Completed</option><option>Cancelled</option></select></div><div style="grid-column:1/-1"><label>Notes</label><textarea name="notes"></textarea></div><button>Save Appointment</button></form></div><div class="card"><div class="table-wrap"><table><thead><tr><th>Client</th><th>Title</th><th>Start</th><th>Status</th></tr></thead><tbody>{% for a in appointments %}<tr><td>{{ a.client_name }}</td><td>{{ a.title }}</td><td>{{ a.start_at }}</td><td>{{ a.status }}</td></tr>{% else %}<tr><td colspan="4">No appointments.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
