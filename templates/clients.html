{% extends "base.html" %}{% block content %}<h1>Clients</h1><div class="card"><form method="POST" class="grid grid-3"><input name="name" placeholder="Client name" required><input name="business_name" placeholder="Business"><input name="email" placeholder="Email"><input name="phone" placeholder="Phone"><input name="address" placeholder="Address"><select name="client_type"><option>Individual</option><option>Business</option><option>Bookkeeping Only</option><option>Tax Only</option><option>Full Service</option></select><select name="status"><option>Active</option><option>Inactive</option></select><textarea name="notes" placeholder="Notes"></textarea><button>Save Client</button></form></div><div class="card"><table><thead><tr><th>Name</th><th>Business</th><th>Email</th><th>Phone</th><th>Type</th></tr></thead><tbody>{% for c in clients %}<tr><td>{{ c.name }}</td><td>{{ c.business_name }}</td><td>{{ c.email }}</td><td>{{ c.phone }}</td><td>{{ c.client_type }}</td></tr>{% else %}<tr><td colspan="5">No clients.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
