{% extends "base.html" %}{% block content %}<h1>My Tax Returns</h1><div class="card"><table><thead><tr><th>Year</th><th>Service</th><th>Status</th><th>Due</th><th>Invoice</th></tr></thead><tbody>{% for r in returns %}<tr><td>{{ r.tax_year }}</td><td>{{ r.service_type }}</td><td>{{ r.status }}</td><td>{{ r.due_date }}</td><td>{{ r.invoice_number }}</td></tr>{% else %}<tr><td colspan="5">No tax returns.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
