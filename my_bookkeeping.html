{% extends "base.html" %}{% block content %}<h1>My Bookkeeping</h1><div class="card"><table><thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Category</th><th>Amount</th></tr></thead><tbody>{% for t in transactions %}<tr><td>{{ t.date }}</td><td>{{ t.description }}</td><td>{{ t.type }}</td><td>{{ t.category_name }}</td><td>{{ t.amount|currency }}</td></tr>{% else %}<tr><td colspan="5">No bookkeeping records.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
