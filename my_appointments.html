{% extends "base.html" %}{% block content %}<h1>My Appointments</h1><div class="card"><table><thead><tr><th>Title</th><th>Start</th><th>End</th><th>Status</th></tr></thead><tbody>{% for a in appointments %}<tr><td>{{ a.title }}</td><td>{{ a.start_at }}</td><td>{{ a.end_at }}</td><td>{{ a.status }}</td></tr>{% else %}<tr><td colspan="4">No appointments.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
