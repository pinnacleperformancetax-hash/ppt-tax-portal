{% extends 'base.html' %}{% block content %}<h1>CRM</h1><p class='sub'>Lead pipeline and follow-up tracking.</p><div class='card'><h2>Add Lead</h2><form method='POST' class='grid grid-3'><input name='name' placeholder='Name' required><input name='phone' placeholder='Phone'><input name='email' placeholder='Email'><input name='source' placeholder='Source'><select name='status'><option>New</option><option>Contacted</option><option>Converted</option></select><input type='date' name='follow_up_date'><textarea name='notes' placeholder='Notes' style='grid-column:1/-1'></textarea><button>Save Lead</button></form></div><div class='card'><h2>Leads</h2><div class='table-wrap'><table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Status</th><th>Follow-up</th></tr></thead><tbody>{% for l in leads %}<tr><td>{{ l.name }}</td><td>{{ l.phone }}</td><td>{{ l.email }}</td><td><span class='pill'>{{ l.status }}</span></td><td>{{ l.follow_up_date }}</td></tr>{% else %}<tr><td colspan='5'>No leads.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
