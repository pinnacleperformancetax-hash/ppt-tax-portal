{% extends "base.html" %}
{% block content %}
<h1>Users</h1>
<div class="card">
<form method="POST" class="grid grid-2">
  <input name="name" placeholder="Name" required>
  <input name="email" placeholder="Email" required>
  <input name="password" placeholder="Password">
  <select name="role"><option value="admin">Admin</option><option value="client">Client</option></select>
  <select name="client_id"><option value="">No client</option>{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select>
  <button>Create User</button>
</form>
</div>
<div class="card">
<table>
<tr><th>Name</th><th>Email</th><th>Role</th><th>Client</th></tr>
{% for row in users %}
<tr><td>{{ row.name }}</td><td>{{ row.email }}</td><td>{{ row.role }}</td><td>{{ row.client_name }}</td></tr>
{% endfor %}
</table>
</div>
{% endblock %}
