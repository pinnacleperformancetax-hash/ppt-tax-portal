
{% extends "base.html" %}

{% block content %}

<h1>Clients</h1>

<form method="POST">

    <input type="text"
           name="name"
           placeholder="Client Name"
           required>

    <input type="email"
           name="email"
           placeholder="Email">

    <input type="text"
           name="phone"
           placeholder="Phone">

    <input type="text"
           name="business_name"
           placeholder="Business Name">

    <textarea name="notes"
              placeholder="Notes"></textarea>

    <button type="submit">
        Add Client
    </button>

</form>

<hr>

<table>
    <tr>
        <th>Name</th>
        <th>Business</th>
        <th>Email</th>
        <th>Phone</th>
    </tr>

    {% for client in clients %}
    <tr>
        <td>{{ client.name }}</td>
        <td>{{ client.business_name }}</td>
        <td>{{ client.email }}</td>
        <td>{{ client.phone }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
