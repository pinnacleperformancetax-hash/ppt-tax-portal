
<style id="PPT_GREEN_HARD_OVERRIDE">
:root{
  --ppt-green:#11823b!important;
  --ppt-green-dark:#0b5f2a!important;
  --ppt-green-light:#1f6f3d!important;
  --ppt-bg:#f4f6f4!important;
}
html,body{background:#f4f6f4!important;color:#1f2937!important}
aside,.sidebar,[class*="sidebar"],nav.sidebar{
  background:linear-gradient(180deg,#11823b 0%,#0b5f2a 100%)!important;
  color:white!important;
  border-right:0!important;
}
aside *, .sidebar *, [class*="sidebar"] *{color:white!important}
aside a,.sidebar a,[class*="sidebar"] a{
  color:white!important;
  background:transparent!important;
  font-weight:900!important;
}
aside a:hover,.sidebar a:hover,[class*="sidebar"] a:hover,
aside a.active,.sidebar a.active,[class*="sidebar"] a.active{
  background:rgba(255,255,255,.18)!important;
}
button,.btn,input[type="submit"]{
  background:#11823b!important;
  color:white!important;
  border:0!important;
  border-radius:12px!important;
  font-weight:900!important;
}
button:hover,.btn:hover,input[type="submit"]:hover{
  background:#1f6f3d!important;
}
.card,.metric,.box,.panel,section{
  background:white!important;
  border-color:#d8e2dc!important;
}
.metric strong,.amount,.total{
  color:#1f6f3d!important;
}
h1,h2,h3{color:#1f2937!important}
input,select,textarea{
  border-color:#cbd5d1!important;
  background:white!important;
}
input:focus,select:focus,textarea:focus{
  outline:3px solid rgba(19,79,44,.16)!important;
  border-color:#1f6f3d!important;
}
.pill,.badge{
  background:#e7f5eb!important;
  color:#11823b!important;
}
</style>

{% extends "base.html" %}{% block content %}<h1>Tax Returns</h1><div class="card"><form method="POST" class="grid grid-3"><select name="client_id">{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select><input name="tax_year" placeholder="Tax year"><input name="service_type" placeholder="Service"><select name="status"><option>In Progress</option><option>Waiting on Client</option><option>Ready for Review</option><option>Filed</option><option>Completed</option></select><input type="date" name="due_date"><input name="fee" placeholder="Fee"><textarea name="notes"></textarea><button>Save Tax Return + Invoice</button></form></div><div class="card"><table><thead><tr><th>Client</th><th>Year</th><th>Service</th><th>Status</th><th>Invoice</th><th>Fee</th></tr></thead><tbody>{% for r in returns %}<tr><td>{{ r.client_name }}</td><td>{{ r.tax_year }}</td><td>{{ r.service_type }}</td><td>{{ r.status }}</td><td>{{ r.invoice_number }}</td><td>{{ r.fee|currency }}</td></tr>{% else %}<tr><td colspan="6">No returns.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
