{% extends "base.html" %}{% block content %}
<h1>Users</h1><div class="card"><h2>Create User</h2><form method="POST" class="grid grid-2"><input name="name" placeholder="Name"><input name="email" placeholder="Email"><input name="password" placeholder="Password" value="Temp123!"><select name="role"><option value="admin">Admin</option><option value="client">Client</option></select><select name="client_id"><option value="">None</option>{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select><button>Create User</button></form></div>
<div class="card"><h2>Users</h2><table><tr><th>Name</th><th>Email</th><th>Role</th><th>Client</th></tr>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.client_name or 'None' }}</td></tr>{% endfor %}</table></div>
{% endblock %}
