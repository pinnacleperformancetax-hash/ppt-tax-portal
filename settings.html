{% extends "base.html" %}{% block content %}<h1>Users</h1><div class="card"><form method="POST" class="grid grid-2"><div><label>Name</label><input name="name" required></div><div><label>Email</label><input name="email" required></div><div><label>Password</label><input name="password" placeholder="Temp123!"></div><div><label>Role</label><select name="role"><option value="client">Client</option><option value="admin">Admin</option></select></div><div><label>Client</label><select name="client_id"><option value="">None</option>{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div><button>Create / Update User</button></form></div><div class="card"><div class="table-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Client</th></tr></thead><tbody>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.client_name or "None" }}</td></tr>{% else %}<tr><td colspan="4">No users.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
