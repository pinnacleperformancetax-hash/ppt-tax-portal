{% extends "base.html" %}{% block content %}<h1>Invoices</h1><div class="card"><form method="POST" class="grid grid-3"><div><label>Client</label><select name="client_id">{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div><div><label>Invoice #</label><input name="invoice_number"></div><div><label>Issue Date</label><input type="date" name="issue_date"></div><div><label>Due Date</label><input type="date" name="due_date"></div><div><label>Amount</label><input name="amount"></div><div><label>Status</label><select name="status"><option>Draft</option><option>Sent</option><option>Paid</option></select></div><div style="grid-column:1/-1"><label>Description</label><textarea name="description"></textarea></div><button>Save Invoice</button></form></div><div class="card"><h2>Invoice Records</h2><div class="table-wrap"><table><thead><tr><th>Invoice</th><th>Client</th><th>Status</th><th>Amount</th><th>Due</th></tr></thead><tbody>{% for i in invoices %}<tr><td>{{ i.invoice_number or i.id }}</td><td>{{ i.client_name or "—" }}</td><td>{{ i.status }}</td><td>{{ i.amount|currency }}</td><td>{{ i.due_date or "—" }}</td></tr>{% else %}<tr><td colspan="5">No invoices.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
