{% extends "base.html" %}{% block content %}<h1>CRM</h1><div class="card"><form method="POST" class="grid grid-3"><div><label>Name</label><input name="name" required></div><div><label>Phone</label><input name="phone"></div><div><label>Email</label><input name="email"></div><div><label>Status</label><select name="status"><option>New</option><option>Contacted</option><option>Converted</option><option>Lost</option></select></div><div><label>Source</label><input name="source"></div><div><label>Follow-up</label><input type="date" name="follow_up_date"></div><div style="grid-column:1/-1"><label>Notes</label><textarea name="notes"></textarea></div><button>Save Lead</button></form></div><div class="card"><h2>Leads</h2><div class="table-wrap"><table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Status</th><th>Source</th><th>Follow-up</th></tr></thead><tbody>{% for l in leads %}<tr><td>{{ l.name }}</td><td>{{ l.phone }}</td><td>{{ l.email }}</td><td>{{ l.status }}</td><td>{{ l.source }}</td><td>{{ l.follow_up_date }}</td></tr>{% else %}<tr><td colspan="6">No leads yet.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
