{% extends "base.html" %}{% block content %}<h1>My CRM / Requests</h1><div class="card"><form method="POST"><input name="subject" placeholder="Subject"><textarea name="notes" placeholder="Request or question"></textarea><button>Send Request</button></form></div><div class="card"><h2>Requests</h2><table><tbody>{% for c in crm_items %}<tr><td>{{ c.created_at }}</td><td>{{ c.status }}</td><td>{{ c.notes }}</td></tr>{% else %}<tr><td>No requests.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
