{% extends "base.html" %}
{% block content %}
<div style="max-width:420px;margin:90px auto;background:white;padding:34px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08);">
  <h1>PPT Portal Login</h1>
  <p class="sub">Sign in to continue</p>
  <form method="POST">
    <input name="email" placeholder="Email" value="admin@pinnacleperformancetax.com" required>
    <br><br>
    <input name="password" type="password" placeholder="Password" required>
    <br><br>
    <button type="submit" style="width:100%;">Login</button>
  </form>
</div>
{% endblock %}
