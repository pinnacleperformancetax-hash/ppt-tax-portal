{% extends "base.html" %}{% block content %}
<h1>Clients</h1><div class="card"><h2>Add Client</h2><form method="POST" class="grid grid-2"><input name="name" placeholder="Client name" required><input name="business_name" placeholder="Business name"><input name="email" placeholder="Email"><input name="phone" placeholder="Phone"><input name="address" placeholder="Address"><input name="client_type" placeholder="Client type"><input name="status" value="Active"><textarea name="notes" placeholder="Notes"></textarea><button>Add Client</button></form></div>
<div class="card"><h2>Client List</h2><table><tr><th>Name</th><th>Business</th><th>Email</th><th>Phone</th><th>Status</th></tr>{% for c in clients %}<tr><td>{{ c.name }}</td><td>{{ c.business_name }}</td><td>{{ c.email }}</td><td>{{ c.phone }}</td><td>{{ c.status }}</td></tr>{% endfor %}</table></div>
{% endblock %}
