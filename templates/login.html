{% extends "base.html" %}

{% block auth_content %}

<div class="card">
  <h1 style="text-align:center;">PPT Portal Login</h1>
  <p class="sub" style="text-align:center;">Sign in to continue</p>

  <form method="POST" style="display:grid; gap:15px; margin-top:20px;">
    <input name="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Password" required>

    <button type="submit">Login</button>
  </form>
</div>

{% endblock %}
