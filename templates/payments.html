{% extends "base.html" %}

{% block content %}

<h2>Payments</h2>

<form method="POST">

    <label><strong>Clover Payment Link</strong></label><br>
    <input type="text" name="clover_link" placeholder="Paste Clover link here (https://...)" style="width:100%; padding:10px; margin-bottom:15px;" required>

    <h3>Make a Payment</h3>

    <label>Select Invoice</label><br>
    <select name="invoice_id" style="width:100%; padding:10px; margin-bottom:10px;">
        <option value="">-- Select Invoice --</option>
        {% for invoice in invoices %}
            <option value="{{ invoice.id }}">{{ invoice.id }} - ${{ invoice.amount }}</option>
        {% endfor %}
    </select>

    <label>Amount</label><br>
    <input type="number" step="0.01" name="amount" placeholder="Enter amount" style="width:100%; padding:10px; margin-bottom:15px;" required>

    <button type="submit" style="background:#11823b; color:white; padding:10px 20px; border:none;">
        Pay with Clover
    </button>

</form>

<hr>

<h3>Payment History</h3>
<p>No payments recorded yet.</p>

{% endblock %}
