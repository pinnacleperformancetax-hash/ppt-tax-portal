{% extends 'base.html' %}
{% block content %}
<div class="grid-2">
<div class="card"><h3 class="section-title">Create User</h3><form method="post"><div class="grid-3">
<input name="name" placeholder="Full name" required>
<input name="email" placeholder="Email" required>
<input name="password" placeholder="Temporary password">
<select name="role"><option value="client">Client</option><option value="admin">Admin</option></select>
<select name="client_id"><option value="">Linked client</option>{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select>
</div><button class="btn" type="submit">Create User</button></form></div>
<div class="card"><h3 class="section-title">Users</h3><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Linked Client</th></tr></thead><tbody>
{% for row in users %}<tr><td>{{ row.name }}</td><td>{{ row.email }}</td><td>{{ row.role }}</td><td>{{ row.client_name or '—' }}</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
