{% extends "base.html" %}

{% block content %}
<div class="page-container">

    <h2>Tax Returns</h2>
    <p style="color:#666; margin-bottom:20px;">
        Track and manage client tax filings.
    </p>

    <div class="card">

        <h3>Create Tax Return</h3>

        <form method="POST">
            <div class="form-row">
                <label>Client</label>
                <select name="client_id" required>
                    <option value="">Select Client</option>
                    {% for client in clients %}
                        <option value="{{ client.id }}">{{ client.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Tax Year</label>
                <input type="text" name="tax_year" placeholder="2025" required>
            </div>

            <div class="form-row">
                <label>Status</label>
                <select name="status">

                    <option value="Filed">Filed</option>
                    <option value="Completed">Completed</option>
                </select>
