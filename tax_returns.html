{% extends "base.html" %}{% block content %}<h1>Tax Returns</h1><div class="card"><form method="POST" class="grid grid-3"><select name="client_id">{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select><input name="tax_year" placeholder="Tax year"><input name="service_type" placeholder="Service"><select name="status"><option>In Progress</option><option>Waiting on Client</option><option>Ready for Review</option><option>Filed</option><option>Completed</option></select><input type="date" name="due_date"><input name="fee" placeholder="Fee"><textarea name="notes"></textarea><button>Save Tax Return + Invoice</button></form></div><div class="card"><table><thead><tr><th>Client</th><th>Year</th><th>Service</th><th>Status</th><th>Invoice</th><th>Fee</th></tr></thead><tbody>{% for r in returns %}<tr><td>{{ r.client_name }}</td><td>{{ r.tax_year }}</td><td>{{ r.service_type }}</td><td>{{ r.status }}</td><td>{{ r.invoice_number }}</td><td>{{ r.fee|currency }}</td></tr>{% else %}<tr><td colspan="6">No returns.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
