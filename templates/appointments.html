{% extends "base.html" %}{% block content %}<h1>Appointments</h1><div class="card"><form method="POST" class="grid grid-3"><select name="client_id">{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select><input name="title" placeholder="Title"><input name="start_at" placeholder="Start"><input name="end_at" placeholder="End"><input name="location" placeholder="Location"><input name="meeting_link" placeholder="Meeting link"><select name="status"><option>Scheduled</option><option>Completed</option><option>Cancelled</option></select><textarea name="notes" placeholder="Notes"></textarea><button>Save Appointment</button></form></div><div class="card"><table><thead><tr><th>Client</th><th>Title</th><th>Start</th><th>Status</th></tr></thead><tbody>{% for a in appointments %}<tr><td>{{ a.client_name }}</td><td>{{ a.title }}</td><td>{{ a.start_at }}</td><td>{{ a.status }}</td></tr>{% else %}<tr><td colspan="4">No appointments.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
