{% extends "base.html" %}{% block content %}<h1>CRM</h1><div class="card"><form method="POST" class="grid grid-3"><div><label>Linked Client</label><select name="client_id"><option value="">None</option>{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div><div><label>Name</label><input name="name" required></div><div><label>Email</label><input name="email"></div><div><label>Phone</label><input name="phone"></div><div><label>Status</label><select name="status"><option>New</option><option>Contacted</option><option>Converted</option><option>Lost</option></select></div><div><label>Source</label><input name="source"></div><div style="grid-column:1/-1"><label>Notes</label><textarea name="notes"></textarea></div><button>Save CRM</button></form></div><div class="card"><div class="table-wrap"><table><thead><tr><th>Linked Client</th><th>Name</th><th>Status</th><th>Notes</th></tr></thead><tbody>{% for l in leads %}<tr><td>{{ l.client_name or "—" }}</td><td>{{ l.name }}</td><td>{{ l.status }}</td><td>{{ l.notes }}</td></tr>{% else %}<tr><td colspan="4">No CRM records.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
