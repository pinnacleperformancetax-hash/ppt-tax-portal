{% extends "base.html" %}{% block content %}<h1>Invoices</h1><div class="card"><form method="POST" class="grid grid-3"><select name="client_id">{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select><input name="invoice_number" placeholder="Invoice #"><input type="date" name="issue_date"><input type="date" name="due_date"><input name="amount" placeholder="Amount"><select name="status"><option>Draft</option><option>Sent</option><option>Paid</option></select><textarea name="description" placeholder="Description"></textarea><button>Save Invoice</button></form></div><div class="card"><table><thead><tr><th>Invoice</th><th>Client</th><th>Status</th><th>Amount</th><th>Due</th><th>Print</th></tr></thead><tbody>{% for i in invoices %}<tr><td>{{ i.invoice_number or i.id }}</td><td>{{ i.client_name }}</td><td>{{ i.status }}</td><td>{{ i.amount|currency }}</td><td>{{ i.due_date }}</td><td><a class="btn" href="/invoice/{{ i.id }}/print">Print</a></td></tr>{% else %}<tr><td colspan="5">No invoices.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
