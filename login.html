<!doctype html><html><head><meta charset="utf-8"><title>PPT Login</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f8fafc,#ecfdf5);font-family:Arial;color:#0f172a}.card{width:100%;max-width:460px;background:white;border-radius:24px;padding:34px;border:1px solid #e5e7eb;box-shadow:0 22px 60px rgba(15,23,42,.13)}.logo{width:54px;height:54px;background:#11823b;color:white;border-radius:16px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-bottom:14px}h1{margin:0 0 8px;color:#0f172a;font-size:30px;line-height:1.05}.bar{height:5px;background:#11823b;border-radius:999px;width:120px;margin:14px 0 18px}p{color:#64748b}label{display:block;font-weight:900;margin:14px 0 6px}input{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:13px}button{width:100%;margin-top:20px;background:#11823b;color:white;padding:14px;font-size:16px;font-weight:900;border:0;border-radius:12px}.flash{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:12px;padding:12px;margin:12px 0}</style></head><body><div class="card"><div class="logo">PPT</div><h1>Pinnacle<br>Performance Tax<br>Portal</h1><div class="bar"></div><p>Secure Admin and Client Login</p>{% with messages = get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endwith %}<form method="POST" action="/login"><label>Email</label><input type="email" name="email" required autofocus><label>Password</label><input type="password" name="password" required><button type="submit">SIGN IN</button></form><p style="font-size:12px;margin-top:18px">Pinnacle Performance Tax and Accounting</p></div></body></html>
