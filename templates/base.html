<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PPT Portal</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#f6f7fb; color:#111827; }
.sidebar { width:240px; background:#0f172a; color:white; position:fixed; top:0; bottom:0; left:0; padding:25px; }
.sidebar a { display:block; color:white; text-decoration:none; margin:10px 0; font-weight:bold; }
.main { margin-left:260px; padding:30px; }
.auth { min-height:100vh; display:flex; justify-content:center; align-items:center; padding:30px; }
.card { background:white; padding:25px; border-radius:14px; box-shadow:0 5px 20px rgba(0,0,0,.08); margin-bottom:20px; }
button { background:#11823b; color:white; border:none; padding:10px 16px; border-radius:8px; font-weight:bold; }
input, textarea, select { width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box; }
.grid { display:grid; gap:12px; }
.grid-2 { grid-template-columns:1fr 1fr; }
.crm-overview { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin:20px 0; }
.metric { background:white; padding:18px; border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,.05); }
.metric strong { display:block; font-size:28px; color:#11823b; }
.lead-card { background:white; padding:18px; border-radius:14px; margin-top:15px; box-shadow:0 4px 14px rgba(0,0,0,.05); }
.status-pill { padding:6px 12px; border-radius:999px; font-size:12px; font-weight:bold; }
.status-new { background:#e5e7eb; }
.status-contacted { background:#bfdbfe; }
.status-converted { background:#bbf7d0; }
.status-lost { background:#fecaca; }
</style>
</head>

<body>

{% if request.path != '/login' %}
<div class="sidebar">
  <h2>PPT</h2>
  <p>Pinnacle Performance Tax</p>

  <a href="/dashboard">Dashboard</a>
  <a href="/clients">Clients</a>
  <a href="/transactions">Bookkeeping</a>
  <a href="/tax_returns">Tax Returns</a>
  <a href="/documents">Documents</a>
  <a href="/invoices">Invoices</a>
  <a href="/appointments">Appointments</a>
  <a href="/crm">CRM</a>
  <a href="/settings">Users</a>
  <a href="/logout">Sign Out</a>
</div>
{% endif %}

<div class="{% if request.path == '/login' %}auth{% else %}main{% endif %}">
  {% block content %}{% endblock %}
</div>

</body>
</html>
