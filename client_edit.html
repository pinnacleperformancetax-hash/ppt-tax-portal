
<style id="PPT_GREEN_HARD_OVERRIDE">
:root{
  --ppt-green:#11823b!important;
  --ppt-green-dark:#0b5f2a!important;
  --ppt-green-light:#1f6f3d!important;
  --ppt-bg:#f4f6f4!important;
}
html,body{background:#f4f6f4!important;color:#1f2937!important}
aside,.sidebar,[class*="sidebar"],nav.sidebar{
  background:linear-gradient(180deg,#11823b 0%,#0b5f2a 100%)!important;
  color:white!important;
  border-right:0!important;
}
aside *, .sidebar *, [class*="sidebar"] *{color:white!important}
aside a,.sidebar a,[class*="sidebar"] a{
  color:white!important;
  background:transparent!important;
  font-weight:900!important;
}
aside a:hover,.sidebar a:hover,[class*="sidebar"] a:hover,
aside a.active,.sidebar a.active,[class*="sidebar"] a.active{
  background:rgba(255,255,255,.18)!important;
}
button,.btn,input[type="submit"]{
  background:#11823b!important;
  color:white!important;
  border:0!important;
  border-radius:12px!important;
  font-weight:900!important;
}
button:hover,.btn:hover,input[type="submit"]:hover{
  background:#1f6f3d!important;
}
.card,.metric,.box,.panel,section{
  background:white!important;
  border-color:#d8e2dc!important;
}
.metric strong,.amount,.total{
  color:#1f6f3d!important;
}
h1,h2,h3{color:#1f2937!important}
input,select,textarea{
  border-color:#cbd5d1!important;
  background:white!important;
}
input:focus,select:focus,textarea:focus{
  outline:3px solid rgba(19,79,44,.16)!important;
  border-color:#1f6f3d!important;
}
.pill,.badge{
  background:#e7f5eb!important;
  color:#11823b!important;
}
</style>

{% extends "base.html" %}{% block content %}
<h1>Edit Client Template</h1><p class="sub">Update all editable client profile, tax, bookkeeping, and onboarding fields.</p>
<div class="quickbar"><a class="btn btn-light" href="/clients">Back to Clients</a><a class="btn" href="/client-statement/{{ client.id }}">Client Statement</a></div>
<form method="POST" action="/clients/{{ client.id }}/update">
<div class="card"><h2 class="section-title">Basic Client Information</h2><div class="grid grid-3">
<div><label>Client Name</label><input name="name" value="{{ client.name or '' }}"></div><div><label>Business Name</label><input name="business_name" value="{{ client.business_name or '' }}"></div><div><label>Email</label><input name="email" value="{{ client.email or '' }}"></div><div><label>Phone</label><input name="phone" value="{{ client.phone or '' }}"></div><div><label>Address</label><input name="address" value="{{ client.address or '' }}"></div><div><label>Preferred Contact</label><input name="preferred_contact" value="{{ client.preferred_contact or '' }}"></div>
</div></div>
<div class="card"><h2 class="section-title">Service Template</h2><div class="grid grid-4">
<div><label>Client Type</label><input name="client_type" value="{{ client.client_type or '' }}"></div><div><label>Service Package</label><input name="service_package" value="{{ client.service_package or '' }}"></div><div><label>Tax Year</label><input name="tax_year" value="{{ client.tax_year or '' }}"></div><div><label>Status</label><input name="status" value="{{ client.status or '' }}"></div><div><label>Onboarding Status</label><input name="onboarding_status" value="{{ client.onboarding_status or '' }}"></div><div><label>Filing Status</label><input name="filing_status" value="{{ client.filing_status or '' }}"></div><div><label>Entity Type</label><input name="entity_type" value="{{ client.entity_type or '' }}"></div><div><label>Occupation</label><input name="occupation" value="{{ client.occupation or '' }}"></div>
</div></div>
<div class="card"><h2 class="section-title">Tax/ID Fields</h2><div class="grid grid-3"><div><label>EIN</label><input name="ein" value="{{ client.ein or '' }}"></div><div><label>SSN Last 4</label><input name="ssn_last4" value="{{ client.ssn_last4 or '' }}"></div><div><label>Date of Birth</label><input name="dob" value="{{ client.dob or '' }}"></div><div><label>Spouse Name</label><input name="spouse_name" value="{{ client.spouse_name or '' }}"></div></div></div>
<div class="card"><h2 class="section-title">Notes</h2><textarea name="notes">{{ client.notes or '' }}</textarea></div><button type="submit">Save Client Template</button></form>
{% endblock %}
