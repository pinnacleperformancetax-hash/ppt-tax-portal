<!doctype html><html><head><meta charset="utf-8"><title>PPT Login</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f8fafc,#ecfdf5);font-family:Arial;color:#134f2c}.card{width:100%;max-width:460px;background:white;border-radius:24px;padding:34px;border:1px solid #e5e7eb;box-shadow:0 22px 60px rgba(15,23,42,.13)}.logo{width:54px;height:54px;background:#1f6f3d;color:white;border-radius:16px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-bottom:14px}h1{margin:0 0 8px;color:#134f2c;font-size:30px;line-height:1.05}.bar{height:5px;background:#1f6f3d;border-radius:999px;width:120px;margin:14px 0 18px}p{color:#64748b}label{display:block;font-weight:900;margin:14px 0 6px}input{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:13px}button{width:100%;margin-top:20px;background:#1f6f3d;color:white;padding:14px;font-size:16px;font-weight:900;border:0;border-radius:12px}.flash{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:12px;padding:12px;margin:12px 0}</style>
<style id="PPT_GREEN_HARD_OVERRIDE">
:root{
  --ppt-green:#134f2c!important;
  --ppt-green-dark:#0f3d22!important;
  --ppt-green-light:#1f6f3d!important;
  --ppt-bg:#f4f6f4!important;
}
html,body{background:#f4f6f4!important;color:#1f2937!important}
aside,.sidebar,[class*="sidebar"],nav.sidebar{
  background:linear-gradient(180deg,#134f2c 0%,#0f3d22 100%)!important;
  color:white!important;
  border-right:0!important;
}
aside *, .sidebar *, [class*="sidebar"] *{color:white!important}
aside a,.sidebar a,[class*="sidebar"] a{
  color:white!important;
  background:transparent!important;
  font-weight:900!important;
}
aside a:hover,.sidebar a:hover,[class*="sidebar"] a:hover,
aside a.active,.sidebar a.active,[class*="sidebar"] a.active{
  background:rgba(255,255,255,.18)!important;
}
button,.btn,input[type="submit"]{
  background:#134f2c!important;
  color:white!important;
  border:0!important;
  border-radius:12px!important;
  font-weight:900!important;
}
button:hover,.btn:hover,input[type="submit"]:hover{
  background:#1f6f3d!important;
}
.card,.metric,.box,.panel,section{
  background:white!important;
  border-color:#d8e2dc!important;
}
.metric strong,.amount,.total{
  color:#1f6f3d!important;
}
h1,h2,h3{color:#1f2937!important}
input,select,textarea{
  border-color:#cbd5d1!important;
  background:white!important;
}
input:focus,select:focus,textarea:focus{
  outline:3px solid rgba(19,79,44,.16)!important;
  border-color:#1f6f3d!important;
}
.pill,.badge{
  background:#e7f5eb!important;
  color:#134f2c!important;
}
</style>

</head><body><div class="card"><div class="logo">PPT</div><h1>Pinnacle<br>Performance Tax<br>Portal</h1><div class="bar"></div><p>Secure Admin and Client Login</p>{% with messages = get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endwith %}<form method="POST" action="/login"><label>Email</label><input type="email" name="email" required autofocus><label>Password</label><input type="password" name="password" required><button type="submit">SIGN IN</button></form><p style="font-size:12px;margin-top:18px">Pinnacle Performance Tax and Accounting</p></div></body></html>
