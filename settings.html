{% extends "base.html" %}{% block content %}<h1>Users</h1><div class="card"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Client</th></tr></thead><tbody>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.client_name }}</td></tr>{% else %}<tr><td colspan="4">No users.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
